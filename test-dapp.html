<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Solen Test dApp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #0a0a1a; color: #e0e0e0; padding: 40px; max-width: 600px; margin: 0 auto; }
    h1 { color: #10b981; margin-bottom: 8px; }
    .sub { color: #666; font-size: 14px; margin-bottom: 32px; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .card h3 { font-size: 14px; color: #9ca3af; margin-bottom: 12px; }
    button { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; }
    button:hover { background: #059669; }
    button:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
    button.secondary { background: #1f2937; color: #d1d5db; }
    button.secondary:hover { background: #374151; }
    input { background: #0d1117; border: 1px solid #374151; color: #e0e0e0; padding: 10px 12px; border-radius: 8px; width: 100%; font-size: 13px; font-family: monospace; margin-bottom: 8px; }
    input::placeholder { color: #4b5563; }
    .status { font-size: 12px; color: #6b7280; margin-top: 8px; }
    .status.ok { color: #10b981; }
    .status.err { color: #ef4444; }
    .mono { font-family: monospace; font-size: 12px; word-break: break-all; }
    .accounts { margin-top: 8px; }
    .account { background: #0d1117; border: 1px solid #1f2937; border-radius: 6px; padding: 8px 12px; margin-top: 4px; font-family: monospace; font-size: 11px; color: #9ca3af; }
    #log { background: #0d1117; border: 1px solid #1f2937; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 11px; color: #9ca3af; max-height: 200px; overflow-y: auto; white-space: pre-wrap; }
    label { font-size: 12px; color: #6b7280; display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <h1>Solen Test dApp</h1>
  <p class="sub">Test page for the Solen browser wallet extension</p>

  <!-- Detection -->
  <div class="card">
    <h3>1. Extension Detection</h3>
    <div id="detect-status" class="status">Checking...</div>
  </div>

  <!-- Connect -->
  <div class="card">
    <h3>2. Connect Wallet</h3>
    <button id="btn-connect" disabled>Connect</button>
    <div id="connect-status" class="status"></div>
    <div id="accounts" class="accounts"></div>
  </div>

  <!-- Send -->
  <div class="card">
    <h3>3. Send Transaction</h3>
    <label>Recipient (hex account ID)</label>
    <input id="send-to" placeholder="e.g. 094c8ccef4cf50ff..." />
    <label>Amount (SOLEN)</label>
    <input id="send-amount" placeholder="e.g. 1.5" />
    <button id="btn-send" disabled>Sign & Send</button>
    <div id="send-status" class="status"></div>
  </div>

  <!-- Grant / Revoke Agent -->
  <div class="card">
    <h3>4. Grant / Revoke Agent</h3>
    <label>Agent public key (hex)</label>
    <input id="agent-key" placeholder="32-byte ed25519 pubkey hex" />
    <button id="btn-genkey" type="button">Generate key</button>
    <label>Lifetime budget (SOLEN, blank = unlimited)</label>
    <input id="agent-budget" placeholder="e.g. 10" />
    <label>Allowed methods (comma-separated, blank = any)</label>
    <input id="agent-methods" placeholder="e.g. transfer" />
    <label>Expires at block height (blank = none)</label>
    <input id="agent-expires" placeholder="e.g. 800000" />
    <button id="btn-grant" disabled>Grant Agent</button>
    <button id="btn-revoke" disabled>Revoke Agent</button>
    <div id="agent-status" class="status"></div>
  </div>

  <!-- Log -->
  <div class="card">
    <h3>Event Log</h3>
    <div id="log"></div>
  </div>

  <script>
    const logEl = document.getElementById("log");
    function log(msg) {
      const time = new Date().toLocaleTimeString();
      logEl.textContent += `[${time}] ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    // 1. Detect extension
    function checkExtension() {
      const el = document.getElementById("detect-status");
      if (window.solen) {
        el.textContent = "Solen Wallet detected!";
        el.className = "status ok";
        document.getElementById("btn-connect").disabled = false;
        log("Extension detected");
      } else {
        el.textContent = "Extension not found. Install and reload.";
        el.className = "status err";
        log("Extension not found");
      }
    }

    // Check immediately and after a short delay (injection may be async).
    checkExtension();
    window.addEventListener("solen#initialized", checkExtension);
    setTimeout(checkExtension, 1000);

    // 2. Connect
    let connectedAccounts = [];
    document.getElementById("btn-connect").addEventListener("click", async () => {
      const statusEl = document.getElementById("connect-status");
      const accountsEl = document.getElementById("accounts");
      try {
        log("Requesting connection...");
        statusEl.textContent = "Requesting...";
        const accounts = await window.solen.connect();
        connectedAccounts = accounts;

        if (accounts.length > 0) {
          statusEl.textContent = `Connected: ${accounts.length} account(s)`;
          statusEl.className = "status ok";
          accountsEl.innerHTML = accounts.map(a =>
            `<div class="account">${a}</div>`
          ).join("");
          document.getElementById("btn-send").disabled = false;
          document.getElementById("btn-grant").disabled = false;
          document.getElementById("btn-revoke").disabled = false;
          log(`Connected: ${accounts.length} account(s)`);
        } else {
          statusEl.textContent = "Connection pending — check extension popup";
          statusEl.className = "status";
          log("Connection pending (needs approval)");
        }
      } catch (e) {
        statusEl.textContent = `Error: ${e.message}`;
        statusEl.className = "status err";
        log(`Connection error: ${e.message}`);
      }
    });

    // 3. Send
    document.getElementById("btn-send").addEventListener("click", async () => {
      const statusEl = document.getElementById("send-status");
      const to = document.getElementById("send-to").value.trim();
      const amount = document.getElementById("send-amount").value.trim();

      if (!to || !amount) {
        statusEl.textContent = "Enter recipient and amount";
        statusEl.className = "status err";
        return;
      }

      try {
        log(`Requesting sign & submit: ${amount} SOLEN to ${to.slice(0, 16)}...`);
        statusEl.textContent = "Requesting signature...";

        const result = await window.solen.signAndSubmit({
          to: to,
          amount: amount,
        });

        log(`Result: ${JSON.stringify(result)}`);

        if (result && result.error) {
          statusEl.textContent = `Error: ${result.error}`;
          statusEl.className = "status err";
        } else {
          statusEl.textContent = "Transaction submitted!";
          statusEl.className = "status ok";
        }
      } catch (e) {
        statusEl.textContent = `Error: ${e.message}`;
        statusEl.className = "status err";
        log(`Send error: ${e.message}`);
      }
    });

    // 4. Grant / Revoke agent
    document.getElementById("btn-genkey").addEventListener("click", async () => {
      try {
        const kp = await crypto.subtle.generateKey({ name: "Ed25519" }, true, ["sign", "verify"]);
        const raw = new Uint8Array(await crypto.subtle.exportKey("raw", kp.publicKey));
        const hex = [...raw].map((b) => b.toString(16).padStart(2, "0")).join("");
        document.getElementById("agent-key").value = hex;
        log(`Generated agent key ${hex.slice(0, 16)}… (demo only — a real agent keeps its own secret)`);
      } catch (e) {
        log(`WebCrypto Ed25519 unavailable here — paste a key from @solen/web-sdk generateAgentKey(). ${e.message}`);
      }
    });

    document.getElementById("btn-grant").addEventListener("click", async () => {
      const statusEl = document.getElementById("agent-status");
      const agentPublicKey = document.getElementById("agent-key").value.trim();
      if (!agentPublicKey) { statusEl.textContent = "Enter or generate an agent key"; statusEl.className = "status err"; return; }
      const budget = document.getElementById("agent-budget").value.trim();
      const methods = document.getElementById("agent-methods").value.trim();
      const expires = document.getElementById("agent-expires").value.trim();
      const grant = {};
      if (budget) grant.budgetTotal = BigInt(Math.round(parseFloat(budget) * 1e8)).toString(); // SOLEN → base units
      if (methods) grant.allowedMethods = methods.split(",").map((s) => s.trim()).filter(Boolean);
      if (expires) grant.expiresAt = parseInt(expires, 10);
      try {
        log("Requesting agent grant — approve in the extension popup…");
        const result = await window.solen.grantAgent({ agentPublicKey, grant });
        log(`Grant result: ${JSON.stringify(result)}`);
        const err = result && result.error;
        statusEl.textContent = err ? `Error: ${err}` : "Agent granted!";
        statusEl.className = err ? "status err" : "status ok";
      } catch (e) {
        statusEl.textContent = `Error: ${e.message}`; statusEl.className = "status err"; log(`Grant error: ${e.message}`);
      }
    });

    document.getElementById("btn-revoke").addEventListener("click", async () => {
      const statusEl = document.getElementById("agent-status");
      const agentPublicKey = document.getElementById("agent-key").value.trim();
      if (!agentPublicKey) { statusEl.textContent = "Enter the agent key to revoke"; statusEl.className = "status err"; return; }
      try {
        log("Requesting agent revoke — approve in the extension popup…");
        const result = await window.solen.revokeAgent({ agentPublicKey });
        log(`Revoke result: ${JSON.stringify(result)}`);
        const err = result && result.error;
        statusEl.textContent = err ? `Error: ${err}` : "Agent revoked!";
        statusEl.className = err ? "status err" : "status ok";
      } catch (e) {
        statusEl.textContent = `Error: ${e.message}`; statusEl.className = "status err"; log(`Revoke error: ${e.message}`);
      }
    });
  </script>
</body>
</html>
